name: .NET Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore dependencies
      run: dotnet restore CyberSecurityBot/CyberSecurityBot.csproj

    - name: Build
      run: dotnet build CyberSecurityBot/CyberSecurityBot.csproj --no-restore --configuration Release
